name: shapeos
description: "ShapeOS - Smart Home Automation App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🌱 State management & routing
  flutter_riverpod: ^2.6.1
  provider: ^6.0.5
  go_router: ^16.2.1

  # 🎙️ Media & voice
  flutter_tts: ^3.8.5
  audioplayers: ^5.2.1
  speech_to_text: ^7.3.0
  vibration: ^3.1.5

  # 📱 Device & connectivity
  device_info_plus: ^10.1.0
  connectivity_plus: ^4.0.1
  url_launcher: ^6.3.2

  # 📍 Location, weather & networking
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  http: ^1.2.2
  intl: ^0.19.0

  # 🌙 Background mic + screen-on for the wake word
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.2.7
  wakelock_plus: ^1.2.8

  # 🎨 UI & charts
  google_fonts: ^6.3.3
  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.0
  syncfusion_flutter_gauges: ^25.1.40

  # 🔥 Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  firebase_database: ^11.3.10
  cloud_firestore: ^5.6.12

  # 🔐 Google Sign-In
  google_sign_in: ^6.1.0

  # 🔔 Notifications
  flutter_local_notifications: ^17.2.2

  # 🪟 Desktop window
  bitsdojo_window: ^0.1.6
  firebase_messaging: ^15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/google.png
    - assets/sounds/alert.wav
    - assets/devices/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
